name: Build & Deploy Frontend
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: sign-in-frontend
    steps:
      - name: Pull latest code
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn install

      - name: Backup existing build
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: |
          if [ -d build ] && [ -f build/index.html ]; then
            cp -a build build.bak
          fi

      - name: Build
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn build
        env:
          NODE_ENV: production
          DISABLE_ESLINT_PLUGIN: true
          GENERATE_SOURCEMAP: false
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Restore build on failure
        if: failure()
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: |
          if [ -d build.bak ]; then
            rm -rf build
            mv build.bak build
            echo "Restored previous build after failure"
          fi

      - name: Reload app with PM2
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          pm2 save

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:3000 || (pm2 logs frontend --lines 50 && exit 1)
