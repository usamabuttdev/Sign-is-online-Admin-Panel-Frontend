name: Build & Deploy Frontend
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: sign-in-frontend
    steps:
      - name: Pull latest code
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend/yarn.lock

      - name: Install dependencies
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn install

      - name: Build
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn build
        env:
          NODE_ENV: production
          DISABLE_ESLINT_PLUGIN: true

      - name: Reload app with PM2
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          pm2 save

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:3000 || (pm2 logs frontend --lines 50 && exit 1)

      - name: Rollback on failure
        if: failure()
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          git reset --hard HEAD~1
          yarn install
          yarn build
          pm2 reload ecosystem.config.js --update-env
          echo "Rolled back to previous version"
