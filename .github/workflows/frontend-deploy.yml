name: Build & Deploy Frontend
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: sign-in-frontend
    steps:
      - name: Pull latest code
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn install

      - name: Backup existing build
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: |
          if [ -d build ] && [ -f build/index.html ]; then
            cp -a build build.bak
          fi

      - name: Build
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: yarn build
        env:
          NODE_ENV: production
          DISABLE_ESLINT_PLUGIN: true
          GENERATE_SOURCEMAP: false
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Restore build on failure
        if: failure()
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
        run: |
          if [ -d build.bak ]; then
            rm -rf build
            mv build.bak build
            echo "Restored previous build after failure"
          fi

      - name: Ensure PM2 survives as a system service
        run: |
          sudo pm2 startup systemd -u ec2-user --hp /home/ec2-user 2>/dev/null || true

      - name: Stop any old process on port 3000
        run: |
          kill $(lsof -t -i:3000) 2>/dev/null || true
          pm2 delete all 2>/dev/null || true

      - name: Start with PM2 (detached from runner)
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
          setsid pm2 start ecosystem.config.js --update-env
          pm2 save

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:3000 || (pm2 logs frontend --lines 50 && exit 1)
