name: Build & Deploy Frontend
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user/Sign-is-online-Admin-Panel-Frontend
            git fetch origin main
            git reset --hard origin/main
            yarn install --frozen-lockfile
            yarn build
            pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sleep 5
            curl --fail http://localhost:3000 || (pm2 logs frontend --lines 50 --nostream && exit 1)

      - name: Clean up backup on success
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            rm -rf /home/ec2-user/Sign-is-online-Admin-Panel-Frontend/build.bak